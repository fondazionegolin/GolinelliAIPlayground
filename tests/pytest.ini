[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: Integration tests (API endpoints against test DB)
    e2e: End-to-end scenario tests (requires running Docker stack)
    benchmark: Performance benchmark tests
    slow: Slow tests that can be skipped in quick runs
timeout = 30
filterwarnings =
    ignore::DeprecationWarning
